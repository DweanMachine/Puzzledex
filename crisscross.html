<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criss-Crossword</title>
</head>
<body>
    <script>
        async function fetchJSONData() {
          try {
            // Fetch the file from the specified path
            const response = await fetch('./three-letter-words.json');

            // Check if the request was successful
            if (!response.ok) {
                throw new Error(`HTTP error! Status: ${response.status}`);
            }

            // Parse the response body as JSON
            const data = await response.json();
            console.log(data); // You can now access data.name, data.age, etc.

            // Example: access specific properties
            console.log("Word List:\n", data);
          } catch (error) {
            console.error('Error fetching JSON:', error);
          }
        }

        // Call the function
        fetchJSONData();
    </script>
</body>
</html>
