<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criss-Crossword</title>
  <link rel="stylesheet" href="../assets/css/crisscross.css">
</head>
<body>
  <h1>Criss-Crossword</h1>
  <button id="generateButton">Create New Word Square</button> <br>

  <div id="gameContainer">
  <!-- Top arrows -->
  <div id="top-arrows">
    <button class="shift" id="0-up">↑</button>
    <button class="shift" id="1-up">↑</button>
    <button class="shift" id="2-up">↑</button>
  </div>

  <!-- Row 0 -->
  <div class="row-wrapper">
    <button class="shift side-button" id="0-left">←</button>
    <div class="board-row">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
    </div>
    <button class="shift side-button" id="0-right">→</button>
  </div>

  <!-- Row 1 -->
  <div class="row-wrapper">
    <button class="shift side-button" id="1-left">←</button>
    <div class="board-row">
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
    </div>
    <button class="shift side-button" id="1-right">→</button>
  </div>

  <!-- Row 2 -->
  <div class="row-wrapper">
    <button class="shift side-button" id="2-left">←</button>
    <div class="board-row">
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>
    <button class="shift side-button" id="2-right">→</button>
  </div>

  <!-- Bottom arrows -->
  <div id="bottom-arrows">
    <button class="shift" id="0-down">↓</button>
    <button class="shift" id="1-down">↓</button>
    <button class="shift" id="2-down">↓</button>
  </div>
</div>

  <script src="../assets/js/crisscross.js"></script>
</body>
</html>
